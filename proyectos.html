<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos — Gabriel Del Cid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">Gabriel Del Cid</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Inicio</a>
      <a href="sobre-mi.html" class="nav-link">Sobre Mí</a>
      <a href="proyectos.html" class="nav-link active">Proyectos</a>
    </div>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="sobre-mi.html" class="nav-link">Sobre Mí</a>
    <a href="proyectos.html" class="nav-link active">Proyectos</a>
  </div>

  <section class="section projects-section">
    <div class="container">
      <h2 class="section-title">Todos los <span class="accent">Proyectos</span></h2>
      <p class="section-sub">Explora mi trabajo</p>
      <div class="projects-grid" id="allProjects"></div>
    </div>
  </section>

  <!-- PROJECT DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal modal-detail" id="modal">
      <button class="modal-close" id="modalClose">✕</button>

      <!-- Two-col: main image + info -->
      <div class="modal-top">
        <div class="modal-main-img" id="modalMainImg"></div>
        <div class="modal-info">
          <h3 id="modalTitle"></h3>
          <p id="modalDesc"></p>
          <a id="modalGithub" href="#" target="_blank" rel="noopener" class="btn btn-primary">Ver en GitHub →</a>
        </div>
      </div>

      <!-- Gallery strip -->
      <div class="modal-gallery-wrap" id="modalGalleryWrap">
        <p class="gallery-label">CAPTURAS</p>
        <div class="modal-gallery" id="modalGallery"></div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightboxOverlay">
    <button class="modal-close lightbox-close" id="lightboxClose">✕</button>
    <div class="lightbox-inner">
      <img id="lightboxImg" src="" alt="" />
      <p class="lightbox-caption" id="lightboxCaption"></p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-links">
        <a href="index.html">Inicio</a>
        <a href="sobre-mi.html">Sobre Mí</a>
        <a href="proyectos.html">Proyectos</a>
      </div>
      <div class="footer-social">
        <a href="https://github.com/gabriel-del13" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/gabriel-delcid-13200x" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    </div>
    <div class="footer-copy">© 2026 Gabriel Del Cid. Todos los derechos reservados.</div>
  </footer>

  <script src="data.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    const grid = document.getElementById('allProjects');
    portfolioData.projects.forEach(p => {
      const card = document.createElement('div');
      card.className = 'project-card clickable';
      card.innerHTML = `
        <div class="project-thumb">
          <img src="${p.thumbnail || ''}" alt="${p.title}" onerror="this.parentElement.classList.add('no-img')" />
        </div>
        <div class="project-info">
          <h3>${p.title}</h3>
          <p>${p.short_description}</p>
          <div class="project-links">
            <a href="${p.github_url}" target="_blank" rel="noopener" class="btn btn-outline btn-sm" onclick="event.stopPropagation()">GitHub →</a>
          </div>
        </div>`;
      card.addEventListener('click', () => openModal(p));
      grid.appendChild(card);
    });

    function openModal(p) {
      document.getElementById('modalTitle').textContent = p.title;
      document.getElementById('modalDesc').textContent = p.description;
      document.getElementById('modalGithub').href = p.github_url;

      // Main image
      const mainImg = document.getElementById('modalMainImg');
      mainImg.classList.remove('no-img');
      if (p.thumbnail) {
        mainImg.innerHTML = `<img src="${p.thumbnail}" alt="${p.title}" onerror="this.parentElement.classList.add('no-img')" />`;
      } else {
        mainImg.innerHTML = '';
        mainImg.classList.add('no-img');
      }

      // Gallery
      const galleryWrap = document.getElementById('modalGalleryWrap');
      const gallery = document.getElementById('modalGallery');
      gallery.innerHTML = '';

      if (p.gallery && p.gallery.length > 0) {
        p.gallery.forEach(item => {
          const thumb = document.createElement('div');
          thumb.className = 'gallery-thumb';
          thumb.innerHTML = `<img src="${item.src}" alt="${item.caption || ''}" onerror="this.parentElement.classList.add('no-img')" />`;
          thumb.addEventListener('click', () => openLightbox(item.src, item.caption));
          gallery.appendChild(thumb);
        });
        galleryWrap.classList.add('visible');
      } else {
        galleryWrap.classList.remove('visible');
      }

      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    // Lightbox
    function openLightbox(src, caption) {
      document.getElementById('lightboxImg').src = src;
      document.getElementById('lightboxCaption').textContent = caption || '';
      document.getElementById('lightboxOverlay').classList.add('open');
    }

    document.getElementById('lightboxClose').addEventListener('click', () => {
      document.getElementById('lightboxOverlay').classList.remove('open');
    });
    document.getElementById('lightboxOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('lightboxOverlay')) {
        document.getElementById('lightboxOverlay').classList.remove('open');
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('lightboxOverlay').classList.remove('open');
        closeModal();
      }
    });

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
  </script>
</body>
</html>
